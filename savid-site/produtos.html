<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Velas Aromáticas — Savid Aromatics</title>
<link rel="icon" href="assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="produtos">
<div id="site-header"></div>
<nav class="breadcrumb"><a href="index.html">Início</a> &gt; Produtos</nav>
<div class="catalog-header">
  <h1>VELAS AROMÁTICAS</h1>
  <div class="filter-bar">
    <div class="filter-icon"><i class="fa-solid fa-sliders"></i></div>
    <div class="total" data-total>Total de 28 produtos</div>
    <div class="sort">
      <span>Ordenar por</span>
      <select id="sort-select">
        <option value="rel">Relevância</option>
        <option value="asc">Menor preço</option>
        <option value="desc">Maior preço</option>
        <option value="az">A-Z</option>
      </select>
    </div>
  </div>
</div>
<div class="product-grid" id="catalog"></div>
<div id="site-footer"></div>
<script src="data/products.js"></script>
<script src="assets/js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var sort = document.getElementById('sort-select');
  function render(){
    var list = SAVID_PRODUCTS.filter(function(p){return p.categoria==='vela'});
    var v = sort.value;
    if(v==='asc') list.sort(function(a,b){return a.preco-b.preco});
    else if(v==='desc') list.sort(function(a,b){return b.preco-a.preco});
    else if(v==='az') list.sort(function(a,b){return a.nome.localeCompare(b.nome)});
    var el = document.getElementById('catalog');
    el.innerHTML = list.map(function(p){
      return '<article class="product-card"><button class="fav"><i class="fa-regular fa-heart"></i></button>'+
        '<a class="product-link" href="produto.html?id='+p.id+'"><img src="'+p.imagem+'" alt="'+p.nome+'" loading="lazy"></a>'+
        '<div class="product-info"><a class="product-link" href="produto.html?id='+p.id+'"><p class="product-name">'+p.nome+'</p></a>'+
        '<div class="product-price">R$ '+p.preco.toFixed(2).replace('.',',')+'</div>'+
        '<button class="btn-add" onclick="addToCart(\''+p.id+'\')"><i class="fa-solid fa-bag-shopping"></i> Adicionar</button></div></article>';
    }).join('');
    document.querySelector('[data-total]').textContent = 'Total de '+list.length+' produtos';
  }
  sort.addEventListener('change', render);
  render();
});
</script>
</body>
</html>
